<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summarize — خلاصہ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0e10;
      color: #f0ede6;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .container { width: 100%; max-width: 680px; animation: fadeUp 0.5s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { text-align: center; margin-bottom: 2.5rem; }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .header h1 span { color: #c9a84c; }

    .urdu-sub {
      font-family: 'Noto Nastaliq Urdu', serif;
      font-size: 1.1rem;
      color: #9b9289;
      margin-top: 0.4rem;
      direction: rtl;
    }

    .card {
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .card:focus-within { border-color: #c9a84c44; }

    .lbl {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b6660;
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #f0ede6;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.75;
      resize: none;
      min-height: 160px;
    }
    textarea::placeholder { color: #3d3c38; }

    .ccount { font-size: 11px; color: #3d3c38; text-align: right; margin-top: 0.5rem; }

    .lang-toggle {
      display: flex;
      background: #0e0e10;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      overflow: hidden;
      flex: 1;
      min-width: 220px;
    }
    .lang-btn {
      flex: 1;
      padding: 0.65rem 1rem;
      border: none;
      background: transparent;
      color: #6b6660;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      transition: color 0.25s;
    }
    .lang-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: #c9a84c;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 0;
    }
    .lang-btn span { position: relative; z-index: 1; }
    .lang-btn.on::before { transform: scaleX(1); }
    .lang-btn.on { color: #0e0e10; }
    .lang-btn:not(.on):hover::before { transform: scaleX(0.08); }
    .lang-btn:last-child { font-family: 'Noto Nastaliq Urdu', serif; font-size: 15px; }

    .len-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .len-btn {
      padding: 0.4rem 1rem;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      background: transparent;
      color: #6b6660;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, border-color 0.2s, transform 0.15s;
    }
    .len-btn::after {
      content: '';
      position: absolute;
      width: 120%; height: 120%; top: -10%; left: -10%;
      background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .len-btn:hover::after { opacity: 1; }
    .len-btn:hover { border-color: #c9a84c55; color: #c9a84caa; transform: translateY(-2px); }
    .len-btn:active { transform: scale(0.94) translateY(0); }
    .len-btn.on { border-color: #c9a84c; color: #c9a84c; animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes popIn { from { transform: scale(0.88); } to { transform: scale(1); } }

    #goBtn {
      padding: 0.65rem 2rem;
      background: #c9a84c;
      border: none; border-radius: 10px;
      color: #0e0e10;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      position: relative; overflow: hidden;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
    }
    #goBtn::before {
      content: '';
      position: absolute; top: -50%; left: -75%;
      width: 50%; height: 200%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
      transform: skewX(-20deg);
      transition: left 0s;
    }
    #goBtn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 6px 24px rgba(201,168,76,0.4); }
    #goBtn:hover::before { left: 130%; transition: left 0.55s ease; }
    #goBtn:active { transform: scale(0.95); box-shadow: none; }
    #goBtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    #goBtn:disabled::before { display: none; }

    #goBtn .ink {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0); animation: inkSpread 0.55s linear;
      pointer-events: none;
    }
    @keyframes inkSpread { to { transform: scale(4); opacity: 0; } }

    .copy-btn {
      margin-top: 1rem; padding: 0.4rem 1rem;
      border: 1px solid #2a2a2e; border-radius: 8px;
      background: transparent; color: #6b6660;
      font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .copy-btn:hover { border-color: #c9a84c; color: #c9a84c; transform: translateY(-1px); box-shadow: 0 3px 12px rgba(201,168,76,0.2); }
    .copy-btn:active { transform: scale(0.93); }
    .copy-btn.did-copy { border-color: #4caf75; color: #4caf75; animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1); }

    .controls { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .hr { height: 1px; background: #2a2a2e; margin: 1rem 0; }
    #out { min-height: 100px; }

    .summ-text { font-size: 16px; line-height: 1.85; color: #f0ede6; animation: fadeUp 0.3s ease both; }
    .summ-text.ur { font-family: 'Noto Nastaliq Urdu', serif; direction: rtl; text-align: right; font-size: 19px; line-height: 2.2; }

    .hint { color: #3d3c38; font-size: 14px; font-style: italic; }

    .dots span { animation: blink 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    .byline { margin-top: 2.5rem; margin-bottom: 1rem; text-align: center; animation: fadeUp 0.8s ease 0.3s both; }
    .byline .made-by { display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #3d3c38; }
    .byline .made-by::before, .byline .made-by::after { content: ''; flex: 1; max-width: 80px; height: 1px; }
    .byline .made-by::before { background: linear-gradient(to right, transparent, #2a2a2e); }
    .byline .made-by::after  { background: linear-gradient(to left,  transparent, #2a2a2e); }
    .byline .devs { display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
    .byline .dev  { font-family: 'DM Serif Display', serif; font-size: 13px; color: #c9a84c; opacity: 0.75; transition: opacity 0.2s; }
    .byline .dev:hover { opacity: 1; }
    .byline .sep  { font-size: 10px; color: #2a2a2e; }

    canvas#mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .container  { position: relative; z-index: 1; }
  </style>
</head>
<body>

<canvas id="mesh"></canvas>

<div class="container">
  <div class="header">
    <h1>Summ<span>ar</span>ize</h1>
    <p class="urdu-sub">خلاصہ کریں</p>
  </div>

  <div class="card">
    <div class="lbl">Your text — English or Urdu</div>
    <textarea id="txt"
      placeholder="Paste or type anything here...&#10;کچھ بھی لکھیں یا پیسٹ کریں"
      oninput="onType()"></textarea>
    <div class="ccount" id="cc">0 characters</div>
  </div>

  <div class="len-row">
    <button class="len-btn on"  data-d="short"  onclick="setDepth(this)">Short</button>
    <button class="len-btn"     data-d="medium" onclick="setDepth(this)">Medium</button>
    <button class="len-btn"     data-d="long"   onclick="setDepth(this)">Detailed</button>
  </div>

  <div class="controls">
    <div class="lang-toggle">
      <button class="lang-btn on" id="btnEn" onclick="setLang('en')"><span>English summary</span></button>
      <button class="lang-btn"    id="btnUr" onclick="setLang('ur')"><span>اردو خلاصہ</span></button>
    </div>
    <button id="goBtn" onclick="go()">Summarize →</button>
  </div>

  <div class="card">
    <div class="lbl">Summary</div>
    <div class="hr"></div>
    <div id="out"><p class="hint">Your summary will appear here...</p></div>
  </div>

  <footer class="byline">
    <div class="made-by">Created by</div>
    <div class="devs">
      <span class="dev">M. Ibrahim Adeel</span>
      <span class="sep">✦</span>
      <span class="dev">Sayed Muneeb Ali</span>
    </div>
  </footer>
</div>

<script>
  var lang  = 'en';
  var depth = 'short';
  var _busy = false;

  var depths = { short: 2, medium: 4, long: 6 };

  function setLang(l) {
    lang = l;
    document.getElementById('btnEn').classList.toggle('on', l === 'en');
    document.getElementById('btnUr').classList.toggle('on', l === 'ur');
  }

  function setDepth(btn) {
    document.querySelectorAll('.len-btn').forEach(function(b) { b.classList.remove('on'); });
    btn.classList.add('on');
    depth = btn.dataset.d;
  }

  function onType() {
    var val = document.getElementById('txt').value;
    document.getElementById('cc').textContent = val.length.toLocaleString() + ' characters';
  }

  async function go() {
    if (_busy) return;

    var txt = document.getElementById('txt').value.trim();
    var out = document.getElementById('out');
    var btn = document.getElementById('goBtn');

    if (!txt) {
      out.innerHTML = '<p class="hint">Nothing to summarize yet.</p>';
      return;
    }

    _busy = true;
    btn.disabled = true;
    btn.textContent = 'Working...';
    out.innerHTML = '<p class="hint"><span class="dots"><span>•</span><span>•</span><span>•</span></span></p>';

    var n = depths[depth];

    var langBit = lang === 'ur'
      ? 'Reply in Urdu only. Conversational Pakistani Urdu, not formal.'
      : 'Reply in English only.';

    var prompt = 'Summarize this in ' + n + (n === 1 ? ' sentence' : ' sentences') + '. ' + langBit + '\n\n' + txt;

    var resp, data;

    try {
      resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          messages: [{ role: 'user', content: prompt }]
        })
      });
    } catch(netErr) {
      out.innerHTML = '<p class="hint">&#9888; Network error — are you offline?</p>';
      _busy = false;
      btn.disabled = false;
      btn.textContent = 'Summarize →';
      return;
    }

    try {
      data = await resp.json();
    } catch(_) {
      out.innerHTML = '<p class="hint">&#9888; Got a weird response, try again.</p>';
      _busy = false; btn.disabled = false; btn.textContent = 'Summarize →';
      return;
    }

    if (!resp.ok) {
      var msg = 'Request failed';
      if (resp.status === 429) msg = 'Rate limited — give it a few seconds.';
      else if (resp.status === 401) msg = 'Auth error. Check your API key.';
      else if (resp.status >= 500) msg = 'Server hiccup, try again shortly.';
      else if (data && data.error && data.error.message) msg = data.error.message;
      out.innerHTML = '<p class="hint">&#9888; ' + msg + '</p>';
      _busy = false; btn.disabled = false; btn.textContent = 'Summarize →';
      return;
    }

    var result = data.content && data.content[0] && data.content[0].text;
    if (!result) {
      out.innerHTML = '<p class="hint">&#9888; Empty response, just try again.</p>';
      _busy = false; btn.disabled = false; btn.textContent = 'Summarize →';
      return;
    }

    out.innerHTML =
      '<p class="summ-text' + (lang === 'ur' ? ' ur' : '') + '">' + result + '</p>' +
      '<button class="copy-btn" onclick="doCopy(this)">Copy</button>';

    _busy = false;
    btn.disabled = false;
    btn.textContent = 'Summarize →';
  }

  function doCopy(btn) {
    var el = document.querySelector('.summ-text');
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(function() {
      btn.textContent = '✓ Copied';
      btn.classList.add('did-copy');
      setTimeout(function() {
        btn.textContent = 'Copy';
        btn.classList.remove('did-copy');
      }, 1800);
    }).catch(function() {
      btn.textContent = "Can't copy here";
      setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
    });
  }

  document.getElementById('goBtn').addEventListener('click', function(e) {
    var r = this.getBoundingClientRect();
    var sz = Math.max(r.width, r.height);
    var ink = document.createElement('span');
    ink.className = 'ink';
    ink.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-r.left-sz/2)+'px;top:'+(e.clientY-r.top-sz/2)+'px';
    this.appendChild(ink);
    ink.addEventListener('animationend', function() { ink.remove(); });
  });
</script>


<script>
(function() {
  var cv  = document.getElementById('mesh');
  var ctx = cv.getContext('2d');

  var COLS = 32, ROWS = 20;
  var PUSH_R  = 200;
  var PUSH_AMT = 70;
  var SMOOTH  = 0.07;

  var W, H, cw, ch;
  var mouse  = { x: -9999, y: -9999 };
  var msmooth = { x: -9999, y: -9999 };
  var pts=[], trail=[], rings=[], sparks=[], shocks=[];
  var t = 0;

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    cw = W/(COLS-1); ch = H/(ROWS-1);
    pts = [];
    for (var r=0; r<ROWS; r++)
      for (var c=0; c<COLS; c++)
        pts.push({ ox:c*cw, oy:r*ch, x:c*cw, y:r*ch, vx:0, vy:0 });
  }

  function pt(c,r) { return pts[r*COLS+c]; }

  function step() {
    t += 0.012;
    msmooth.x += (mouse.x - msmooth.x)*SMOOTH;
    msmooth.y += (mouse.y - msmooth.y)*SMOOTH;

    for (var i=0; i<pts.length; i++) {
      var p = pts[i];
      var wave = Math.sin(t + p.ox*0.008) * Math.cos(t*0.7 + p.oy*0.009) * 6;

      var dx = p.ox-msmooth.x, dy = p.oy-msmooth.y;
      var d  = Math.sqrt(dx*dx+dy*dy)||1;
      var f  = Math.max(0, 1-d/PUSH_R);
      var push = f*f*PUSH_AMT;
      var tx = p.ox+(dx/d)*push;
      var ty = p.oy+(dy/d)*push+wave;

      for (var j=0; j<shocks.length; j++) {
        var s = shocks[j];
        var sdx=p.ox-s.x, sdy=p.oy-s.y;
        var sd = Math.sqrt(sdx*sdx+sdy*sdy)||1;
        var hit = Math.max(0, 1-Math.abs(sd-s.r)/60);
        p.vx += (sdx/sd)*hit*18;
        p.vy += (sdy/sd)*hit*18;
      }

      p.vx = (p.vx+(tx-p.x)*0.16)*0.76;
      p.vy = (p.vy+(ty-p.y)*0.16)*0.76;
      p.x += p.vx; p.y += p.vy;
    }

    if (mouse.x > -999) trail.push({x:mouse.x,y:mouse.y,age:0});
    trail.forEach(function(p){p.age++;});
    trail = trail.filter(function(p){return p.age<28;});

    rings.forEach(function(r){r.r+=4;r.a-=0.018;});
    rings = rings.filter(function(r){return r.a>0;});

    sparks.forEach(function(s){s.x+=s.vx;s.y+=s.vy;s.vy+=0.12;s.vx*=0.97;s.life--;});
    sparks = sparks.filter(function(s){return s.life>0;});

    shocks.forEach(function(s){s.r+=6;s.a-=0.022;});
    shocks = shocks.filter(function(s){return s.a>0;});
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    for (var i=1; i<trail.length; i++) {
      var a=trail[i-1], b=trail[i];
      var pct = 1-b.age/28;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle='rgba(201,168,76,'+(pct*0.45)+')';
      ctx.lineWidth=pct*3; ctx.lineCap='round'; ctx.stroke();
    }

    shocks.forEach(function(s){
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.strokeStyle='rgba(201,168,76,'+s.a+')'; ctx.lineWidth=2; ctx.stroke();
    });

    rings.forEach(function(r){
      ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,210,100,'+r.a+')'; ctx.lineWidth=1; ctx.stroke();
    });

    for (var row=0; row<ROWS; row++) {
      for (var col=0; col<COLS-1; col++) {
        var p0=pt(col,row), p1=pt(col+1,row);
        var inten=Math.min(Math.hypot(p0.x-p0.ox,p0.y-p0.oy)/PUSH_AMT,1);
        ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y);
        ctx.strokeStyle='rgba(201,168,76,'+(0.05+inten*0.4)+')';
        ctx.lineWidth=0.4+inten*1.4; ctx.stroke();
      }
    }
    for (var col=0; col<COLS; col++) {
      for (var row=0; row<ROWS-1; row++) {
        var p0=pt(col,row), p1=pt(col,row+1);
        var inten=Math.min(Math.hypot(p0.x-p0.ox,p0.y-p0.oy)/PUSH_AMT,1);
        ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y);
        ctx.strokeStyle='rgba(201,168,76,'+(0.05+inten*0.4)+')';
        ctx.lineWidth=0.4+inten*1.4; ctx.stroke();
      }
    }

    for (var i=0; i<pts.length; i++) {
      var p=pts[i];
      var inten=Math.min(Math.hypot(p.x-p.ox,p.y-p.oy)/PUSH_AMT,1);
      if (inten>0.04) {
        ctx.beginPath(); ctx.arc(p.x,p.y,1+inten*3,0,Math.PI*2);
        ctx.fillStyle='rgba(255,200,80,'+(inten*0.75)+')'; ctx.fill();
      }
    }

    sparks.forEach(function(s){
      var lr=s.life/s.max;
      ctx.beginPath(); ctx.arc(s.x,s.y,1.5*lr,0,Math.PI*2);
      ctx.fillStyle='rgba(255,220,100,'+(lr*0.9)+')'; ctx.fill();
    });

    if (mouse.x > -999) {
      var g=ctx.createRadialGradient(msmooth.x,msmooth.y,0,msmooth.x,msmooth.y,80);
      g.addColorStop(0,'rgba(201,168,76,0.12)');
      g.addColorStop(1,'rgba(201,168,76,0)');
      ctx.beginPath(); ctx.arc(msmooth.x,msmooth.y,80,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    }
  }

  function loop() { step(); draw(); requestAnimationFrame(loop); }

  function burst(x,y,n) {
    for (var i=0; i<n; i++) {
      var a=Math.random()*Math.PI*2;
      var spd=1.5+Math.random()*4;
      var life=(20+Math.random()*25)|0;
      sparks.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:life,max:life});
    }
  }

  window.addEventListener('mousemove', function(e){
    mouse.x=e.clientX; mouse.y=e.clientY;
    if (Math.random()<0.08) rings.push({x:e.clientX,y:e.clientY,r:2,a:0.5});
  });
  window.addEventListener('click', function(e){
    shocks.push({x:e.clientX,y:e.clientY,r:10,a:0.9});
    rings.push({x:e.clientX,y:e.clientY,r:4,a:0.8});
    rings.push({x:e.clientX,y:e.clientY,r:4,a:0.5});
    burst(e.clientX,e.clientY,22);
  });
  window.addEventListener('touchmove',function(e){
    mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY;
  },{passive:true});
  window.addEventListener('touchstart',function(e){
    var tc=e.touches[0];
    shocks.push({x:tc.clientX,y:tc.clientY,r:10,a:0.9});
    burst(tc.clientX,tc.clientY,18);
  },{passive:true});

  window.addEventListener('resize', resize);
  resize();
  loop();
})();
</script>

</body>
</html>
